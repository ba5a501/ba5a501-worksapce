<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32_HUB Controller</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            background-color: #0a0a0a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: #1a1a1a;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
        }
        h2 { color: #00ff88; margin-top: 0; text-align: center; }
        .status {
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            color: #ff4444;
        }
        .btn {
            background: #00ff88;
            color: black;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .control-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #aaa; }
        input[type="range"] {
            width: 100%;
            height: 10px;
            border-radius: 5px;
            background: #333;
            outline: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 25px;
            height: 25px;
            background: #00ff88;
            border-radius: 50%;
            cursor: pointer;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background: #333;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>ESP32_HUB</h2>
        <div id="status" class="status">Disconnected</div>
        <button class="btn" onclick="initBluetooth()">CONNECT TO HUB</button>

        <div class="control-group">
            <label>Continuous 1 (P15)</label>
            <input type="range" min="0" max="255" value="127" oninput="sendSlider(0, this.value)">
        </div>

        <div class="control-group">
            <label>Continuous 2 (P2)</label>
            <input type="range" min="0" max="255" value="127" oninput="sendSlider(1, this.value)">
        </div>

        <div class="control-group">
            <label>Continuous 3 (P0)</label>
            <input type="range" min="0" max="255" value="127" oninput="sendSlider(2, this.value)">
        </div>

        <div class="control-group">
            <label>Standard Servo (P4)</label>
            <input type="range" min="0" max="255" value="0" oninput="sendSlider(3, this.value)">
        </div>

        <div class="control-group">
            <label>OLED Message</label>
            <input type="text" id="msgInput" placeholder="Type message..." onchange="sendText(this.value)">
        </div>
    </div>

    <script>
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        let device, server, characteristic;
        let isSending = false; // Throttling flag

        async function initBluetooth() {
            const statusDiv = document.getElementById('status');
            try {
                statusDiv.innerText = "Searching...";
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'ESP32_HUB' }],
                    optionalServices: [SERVICE_UUID]
                });

                statusDiv.innerText = "Connecting...";
                server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

                statusDiv.innerText = "Connected ✅";
                statusDiv.style.color = "#00ff88";

                device.addEventListener('gattserverdisconnected', () => {
                    statusDiv.innerText = "Disconnected";
                    statusDiv.style.color = "#ff4444";
                });

            } catch (e) {
                console.log(e);
                statusDiv.innerText = "Error: " + e.message;
            }
        }

        // Throttled function for high-frequency slider movement
        async function sendSlider(id, val) {
            if (!characteristic || isSending) return;

            isSending = true;
            try {
                const data = "S" + id + ":" + val;
                await characteristic.writeValue(new TextEncoder().encode(data));
                
                // 50ms throttle prevents the Bluetooth stack from crashing
                setTimeout(() => { isSending = false; }, 50); 
            } catch (e) {
                isSending = false;
            }
        }

        async function sendText(msg) {
            if (!characteristic) return;
            try {
                await characteristic.writeValue(new TextEncoder().encode(msg));
            } catch (e) {
                console.log(e);
            }
        }
    </script>
</body>
</html>
