<!DOCTYPE html>
<html>
<head>
    <title>Bekheit's Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #050505; color: #00d4ff; font-family: 'Courier New', Courier, monospace; text-align: center; padding: 20px; }
        .nav-container { margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 20px; }
        select { padding: 10px; background: #111; color: #00d4ff; border: 1px solid #00d4ff; border-radius: 5px; width: 80%; max-width: 300px; }
        .project-box { display: none; padding: 20px; border: 1px dashed #333; border-radius: 10px; }
        .active { display: block; }
        input[type="text"] { padding: 12px; width: 80%; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: #000; color: white; }
        input[type="range"] { width: 80%; margin: 15px 0; accent-color: #00d4ff; }
        .btn-connect { padding: 15px 30px; background: #ff0055; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-bottom: 20px; width: 80%; }
        .btn-send { padding: 10px 20px; background: #00d4ff; color: black; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .status { margin-top: 15px; font-size: 0.9em; color: #555; }
    </style>
</head>
<body>

    <div class="nav-container">
        <h1>PROJECT HUB</h1>
        <button class="btn-connect" onclick="initBluetooth()">1. CONNECT TO ESP32</button>
        <div class="status" id="status">Status: Disconnected</div>
        <br>
        <label>SELECT PROJECT:</label><br>
        <select id="projectSelect" onchange="switchProject()">
            <option value="astro">Astro-Control</option>
            <option value="switch">Switch</option>
        </select>
    </div>

    <div id="astroProject" class="project-box active">
        <h2>🚀 ASTRO CONTROL</h2>
        <input type="text" id="messageInput" placeholder="Type text here...">
        <button class="btn-send" onclick="sendText()">SEND TEXT</button>
        
        <div style="margin-top:20px; border-top: 1px solid #222; padding-top:20px;">
            <h3>COSMETIC SLIDERS</h3>
            <label>Slider 1</label><br>
            <input type="range" min="0" max="255" value="0" oninput="sendSlider(0, this.value)"><br>
            <label>Slider 2</label><br>
            <input type="range" min="0" max="255" value="0" oninput="sendSlider(1, this.value)"><br>
            <label>Slider 3</label><br>
            <input type="range" min="0" max="255" value="0" oninput="sendSlider(2, this.value)">
        </div>
    </div>

    <div id="switchProject" class="project-box">
        <h2>🔌 REMOTE SWITCH</h2>
        <div style="font-size: 3em; margin-top: 20px;">🚧</div>
        <p>Empty for now.</p>
    </div>

    <script>
        let device, server, characteristic;
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        function switchProject() {
            const selection = document.getElementById('projectSelect').value;
            document.getElementById('astroProject').className = (selection === 'astro') ? 'project-box active' : 'project-box';
            document.getElementById('switchProject').className = (selection === 'switch') ? 'project-box active' : 'project-box';
        }

        async function initBluetooth() {
            const statusDiv = document.getElementById('status');
            try {
                statusDiv.innerText = "Searching...";
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'ESP32_BLE' }],
                    optionalServices: [SERVICE_UUID]
                });
                server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
                statusDiv.innerText = "Connected! ✅";
                statusDiv.style.color = "#00ff88";
            } catch (e) {
                statusDiv.innerText = "Error: " + e;
                console.log(e);
            }
        }

        async function sendText() {
            if (!characteristic) return;
            const msg = document.getElementById('messageInput').value;
            await characteristic.writeValue(new TextEncoder().encode(msg));
        }

        async function sendSlider(id, val) {
            if (!characteristic) return;
            try {
                const data = "S" + id + ":" + val;
                await characteristic.writeValue(new TextEncoder().encode(data));
            } catch (e) { console.log(e); }
        }
    </script>
</body>
</html>
